kind = "web"
previewPath = "/"
title = "Meeting Room Reservation"
version = "1.0.0"
id = "artifacts/meeting-rooms"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22926

[services.development]
run = "pnpm --filter @workspace/meeting-rooms run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/meeting-rooms", "run", "build" ]
publicDir = "artifacts/meeting-rooms/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22926"
BASE_PATH = "/"
